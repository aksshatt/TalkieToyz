<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Default SEO (overridden per-page by react-helmet-async) -->
    <title>TalkieToys - Speech Therapy Toys for Kids</title>
    <meta name="description" content="Quality speech therapy toys designed by therapists to help children practice specific sounds and build communication skills." />
    <meta name="robots" content="index, follow" />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <link rel="apple-touch-icon" sizes="180x180" href="/vite.svg" />

    <!-- Open Graph defaults -->
    <meta property="og:site_name" content="TalkieToys" />
    <meta property="og:title" content="TalkieToys - Speech Therapy Toys for Kids" />
    <meta property="og:description" content="Quality speech therapy toys designed by therapists to help children practice specific sounds and build communication skills." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://talkietoyz.shop" />
    <meta property="og:image" content="https://talkietoyz.shop/og-image.jpg" />

    <!-- Twitter Card defaults -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="TalkieToys - Speech Therapy Toys for Kids" />
    <meta name="twitter:description" content="Quality speech therapy toys designed by therapists to help children practice specific sounds and build communication skills." />
    <meta name="twitter:image" content="https://talkietoyz.shop/og-image.jpg" />

    <!-- Preconnect for performance -->
    <link rel="preconnect" href="https://checkout.razorpay.com" />
    <link rel="dns-prefetch" href="https://checkout.razorpay.com" />

    <!-- Razorpay SDK -->
    <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
