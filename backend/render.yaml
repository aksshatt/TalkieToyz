databases:
  - name: talkietoys-db
    plan: free
    databaseName: talkietoys_production
    ipAllowList: []

services:
  - type: web
    name: talkietoys-backend
    runtime: ruby
    plan: free
    rootDir: backend
    buildCommand: "./bin/render-build.sh"
    startCommand: "bundle exec puma -C config/puma.rb"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: talkietoys-db
          property: connectionString
      - key: RAILS_ENV
        value: production
      - key: RAILS_MASTER_KEY
        sync: false
      - key: RAILS_LOG_LEVEL
        value: info
      - key: WEB_CONCURRENCY
        value: 1
      - key: RAILS_MAX_THREADS
        value: 5
